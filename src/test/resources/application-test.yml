  jwt:
    secret: VGhpcy1pcy1hLXZlcnktbG9uZy1iYXNlNjQtc2VjcmV0LWtleS1mb3ItdHVybmVycGx1cw==
    access-token-expiration-minutes: 60

logging:
  level:
    org.hibernate.SQL: warn